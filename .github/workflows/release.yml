name: release

# Tag a release: git tag vX.Y.Z && git push origin vX.Y.Z
# Pure-python, so no compile matrix. Build a wheel + sdist with uv and attach them to the GitHub
# Release. install.sh installs the release wheel from here by default (no git or compiler on the
# host) — the tag itself is what `asgard upgrade` pins.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 태그 ↔ __version__ 불일치 방어 — 불일치면 wheel 파일명이 태그와 어긋나
      # install.sh 의 releases/download/v{tag}/asgard-{tag}-*.whl URL 이 404 가 된다.
      - name: Verify tag matches __version__
        run: |
          v="$(sed -n 's/.*__version__ = "\([^"]*\)".*/\1/p' src/asgard/__init__.py)"
          [ "v$v" = "$GITHUB_REF_NAME" ] || { echo "::error::tag $GITHUB_REF_NAME != __version__ $v — src/asgard/__init__.py 를 먼저 올리세요"; exit 1; }

      - uses: astral-sh/setup-uv@v5

      - name: Build wheel + sdist
        run: uv build

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  desktop-windows:
    needs: release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - run: npm ci
        working-directory: desktop

      - run: cargo test
        working-directory: desktop/src-tauri

      - run: npm run bundle:windows
        working-directory: desktop

      - name: Attach Windows installer
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/src-tauri/target/release/bundle/nsis/*-setup.exe
