name: ci

# 품질 게이트: lint + format + typecheck + test.
# 로컬 베이스라인과 동일 커맨드 — ruff check · ruff format --check · ty check · pytest.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"

      - run: uv sync --group dev

      - run: uv run ruff check

      - run: uv run ruff format --check

      - run: uv run ty check

      # 커버리지는 리포트만 (게이트 아님) — 공백이 파이프라인 로그에 보이게. 문턱은 정책 결정 후.
      - run: uv run pytest -q --cov=asgard --cov-report=term

  # 설치 머니패스 + 스캐폴드/가드 하네스 — pytest 밖의 셸 하네스를 CI 에 편입 (e2e_trinity.sh 는
  # 실 API 키 필요라 제외, docker/sandbox 는 로컬 전용).
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"

      - run: bash tests/smoke.sh

  windows-terminal:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"

      - run: uv sync --group dev

      - run: uv run pytest -q tests/test_windows.py tests/test_start.py

      - name: Initialize terminal input
        run: uv run python tests/smoke_pt_session.py
