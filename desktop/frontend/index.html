<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>Asgard Desktop</title>
  <style>
    :root{font-family:ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color-scheme:light dark}
    body{min-height:100vh;margin:0;display:grid;place-items:center;background:#f6f5f1;color:#24231f}
    main{max-width:520px;padding:40px;text-align:center}h1{font-size:28px;margin:0 0 12px}p{color:#615e57;line-height:1.6}
    code{background:#ebe9e2;border-radius:6px;padding:3px 6px}@media(prefers-color-scheme:dark){body{background:#1d1d1b;color:#f1efe8}p{color:#afaca3}code{background:#34332f}}
  </style>
</head>
<body><main><h1>Asgard Desktop를 시작할 수 없습니다</h1><p>Asgard 런타임을 찾지 못했습니다. 터미널에서 <code>asgard desktop</code>을 실행하거나 Asgard 설치 상태를 확인해 주세요.</p></main></body>
</html>
