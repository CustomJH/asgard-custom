name: asgard-project-memory2

services:
  cognee:
    build:
      context: .
      dockerfile: Dockerfile
    image: asgard/cognee-fastembed:1.3.0
    restart: unless-stopped
    ports:
      - "${COGNEE_BIND_ADDRESS:-0.0.0.0}:${COGNEE_PORT:-8000}:8000"
    environment:
      ENV: prod
      DEBUG: "false"
      LOG_LEVEL: ${COGNEE_LOG_LEVEL:-INFO}
      HTTP_PORT: "8000"
      BIND_ADDRESS: "0.0.0.0"
      CORS_ALLOWED_ORIGINS: ${COGNEE_CORS_ALLOWED_ORIGINS:-}
      TELEMETRY_DISABLED: "1"
      LITELLM_LOG: ERROR

      # Cognify/graph extraction is optional at deployment time. The API,
      # authentication and storage can remain healthy when the mapped model is
      # temporarily unavailable; doctor/e2e report that state as degraded.
      LLM_PROVIDER: ${COGNEE_LLM_PROVIDER:-ollama}
      LLM_MODEL: ${COGNEE_LLM_MODEL:-ollama/llama3.2:latest}
      LLM_ENDPOINT: ${COGNEE_LLM_ENDPOINT:-http://host.docker.internal:11434/v1}
      LLM_API_KEY: ${COGNEE_LLM_API_KEY:-ollama}
      STRUCTURED_OUTPUT_FRAMEWORK: instructor
      LLM_RATE_LIMIT_ENABLED: "true"
      LLM_RATE_LIMIT_REQUESTS: "1"
      LLM_RATE_LIMIT_INTERVAL: "1"
      LLM_MAX_COMPLETION_TOKENS: "4096"

      # CPU-only, in-process ONNX embeddings. e5-large is FastEmbed 0.8.0's
      # built-in multilingual E5 model; no API key, GPU, or embedding server.
      EMBEDDING_PROVIDER: fastembed
      EMBEDDING_MODEL: intfloat/multilingual-e5-large
      EMBEDDING_DIMENSIONS: "1024"
      EMBEDDING_BATCH_SIZE: "8"
      FASTEMBED_CACHE_PATH: /root/.cache/fastembed

      DB_PROVIDER: sqlite
      DB_NAME: cognee_db
      GRAPH_DATABASE_PROVIDER: kuzu
      GRAPH_DATASET_DATABASE_HANDLER: kuzu
      GRAPH_DATABASE_SUBPROCESS_ENABLED: "true"
      VECTOR_DB_PROVIDER: lancedb
      VECTOR_DATASET_DATABASE_HANDLER: lancedb
      VECTOR_DB_SUBPROCESS_ENABLED: "true"
      ENABLE_BACKEND_ACCESS_CONTROL: "true"
      REQUIRE_AUTHENTICATION: "true"
      DEFAULT_USER_EMAIL: ${COGNEE_DEFAULT_USER_EMAIL:?set COGNEE_DEFAULT_USER_EMAIL in .env}
      DEFAULT_USER_PASSWORD: ${COGNEE_DEFAULT_USER_PASSWORD:?set COGNEE_DEFAULT_USER_PASSWORD in .env}
      FASTAPI_USERS_VERIFICATION_TOKEN_SECRET: ${COGNEE_VERIFICATION_SECRET:?set COGNEE_VERIFICATION_SECRET in .env}
      FASTAPI_USERS_RESET_PASSWORD_TOKEN_SECRET: ${COGNEE_RESET_SECRET:?set COGNEE_RESET_SECRET in .env}

      DATA_ROOT_DIRECTORY: /data/cognee/data
      SYSTEM_ROOT_DIRECTORY: /data/cognee/system
      CACHE_ROOT_DIRECTORY: /data/cognee/cache
      DATABASE_MAX_LRU_CACHE_SIZE: "2"
      DATASET_QUEUE_ENABLED: "true"
      DATASET_QUEUE_MAX_CONCURRENT: "1"
      ENABLE_AUTO_MIGRATIONS: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/data/cognee
      - ./models:/root/.cache
      - ./fixtures:/fixtures:ro
      - ./provider-readiness.py:/opt/asgard/provider-readiness.py:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 60
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: "${COGNEE_CPU_LIMIT:-6.0}"
          memory: ${COGNEE_MEMORY_LIMIT:-12G}

